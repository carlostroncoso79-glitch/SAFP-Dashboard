name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# 🔑 PERMISOS EXPLÍCITOS (esto es clave)
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Create config file with environment variables
        run: |
          # Crear carpeta assets/js si no existe
          mkdir -p assets/js
          
          # Generar config.js con las variables
          cat > assets/js/config.js << 'EOF'
          // Archivo generado automáticamente por GitHub Actions
          export const CONFIG = {
              SUPABASE_URL: '${{ secrets.SUPABASE_URL }}',
              SUPABASE_ANON_KEY: '${{ secrets.SUPABASE_ANON_KEY }}'
          };
          EOF
          
          # Verificar que se creó correctamente
          echo "✅ Config.js generado:"
          cat assets/js/config.js
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy con variables de entorno inyectadas'
