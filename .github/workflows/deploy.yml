name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Inject environment variables
        run: |
          # Crear config.js con las variables inyectadas
          echo "// Archivo generado automáticamente por GitHub Actions" > assets/js/config.js
          echo "export const CONFIG = {" >> assets/js/config.js
          echo "    SUPABASE_URL: '${{ secrets.SUPABASE_URL }}'," >> assets/js/config.js
          echo "    SUPABASE_ANON_KEY: '${{ secrets.SUPABASE_ANON_KEY }}'" >> assets/js/config.js
          echo "};" >> assets/js/config.js
          
          # Mostrar el contenido para verificar (opcional)
          echo "✅ Config.js generado:"
          cat assets/js/config.js
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy con variables de entorno inyectadas'
